<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mickaelly Costa — Links</title>
<meta name="description" content="Links de Mickaelly Costa — portfólio, GitHub, LinkedIn e currículo." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --brand: #7C3AED;
    --surface: #FFFFFF;
    --surface-alt: #F7F5FC;
    --ink: #1A1523;
    --ink-secondary: #6B6478;
    --edge: #E4E1F0;
  }

  html.dark {
    --brand: #A78BFA;
    --surface: #0F0B1A;
    --surface-alt: #191325;
    --ink: #F1EEF9;
    --ink-secondary: #9992A8;
    --edge: #2E2640;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--surface);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    transition: background-color 0.3s, color 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: relative;
    overflow-x: hidden;
  }

  /* brilho ambiente, igual ao do portfólio */
  body::before {
    content: "";
    position: fixed;
    top: -10%;
    left: 50%;
    transform: translateX(-50%);
    width: 60rem;
    height: 34rem;
    background: radial-gradient(circle, rgba(124, 58, 237, 0.10) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  html.dark body::before {
    background: radial-gradient(circle, rgba(167, 139, 250, 0.20) 0%, transparent 70%);
  }

  .card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    text-align: center;
  }

  .theme-toggle {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 2;
    background: transparent;
    border: 1px solid var(--edge);
    color: var(--ink-secondary);
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 999px;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
  }
  .theme-toggle:hover {
    color: var(--brand);
    border-color: var(--brand);
  }

  .avatar {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--edge);
    margin: 0 auto 20px;
    display: block;
    background: var(--surface-alt);
  }

  .tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--brand);
    margin: 0 0 10px;
  }
  .tag .dim { opacity: 0.6; }

  h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 500;
    font-size: 26px;
    margin: 0 0 6px;
  }

  .role {
    font-size: 14px;
    color: var(--ink-secondary);
    margin: 0 0 28px;
  }

  .links {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .link-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 13px 20px;
    border-radius: 10px;
    border: 1px solid var(--edge);
    background: var(--surface-alt);
    color: var(--ink);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
  }
  .link-btn:hover {
    border-color: var(--brand);
    transform: translateY(-2px);
    box-shadow: 0 8px 20px -8px rgba(124, 58, 237, 0.35);
  }
  .link-btn.primary {
    background: var(--brand);
    color: #fff;
    border-color: transparent;
  }
  html.dark .link-btn.primary { color: #0F0B1A; }

  footer {
    margin-top: 32px;
    font-size: 11px;
    color: var(--ink-secondary);
    font-family: 'JetBrains Mono', monospace;
  }
</style>
</head>
<body>

  <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">Escuro</button>

  <div class="card">
    <img class="avatar" src="foto.jpeg" alt="Foto de Mickaelly Costa" onerror="this.style.display='none'">

    <p class="tag"><span class="dim">&lt;</span>mickaelly.links<span class="dim"> /&gt;</span></p>
    <h1>Mickaelly Costa</h1>
    <p class="role">Estudante de Ciência da Computação · Backend com Java &amp; Node.js</p>

    <nav class="links">
      <a class="link-btn primary" href="https://mickaellysilva.github.io/portfolio/" target="_blank" rel="noreferrer">Portfólio</a>
      <a class="link-btn" href="https://github.com/Mickaellysilva" target="_blank" rel="noreferrer">GitHub</a>
      <a class="link-btn" href="https://www.linkedin.com/in/mickaellys/" target="_blank" rel="noreferrer">LinkedIn</a>
      <a class="link-btn" href="Curriculo_Mickaelly_Costa.pdf" target="_blank" rel="noreferrer">Currículo (PDF)</a>
      <a class="link-btn" href="mailto:mickaellysrs@gmail.com">Enviar e-mail</a>
    </nav>

    <footer>&copy; <span id="year"></span> Mickaelly Costa</footer>
  </div>

  <script>
    function applyTheme(dark) {
      document.documentElement.classList.toggle('dark', dark);
      document.getElementById('themeBtn').textContent = dark ? 'Claro' : 'Escuro';
    }
    function toggleTheme() {
      const next = !document.documentElement.classList.contains('dark');
      applyTheme(next);
      localStorage.setItem('theme', next ? 'dark' : 'light');
    }
    (function () {
      const stored = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      applyTheme(stored ? stored === 'dark' : prefersDark);
    })();
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>

</body>
</html>
